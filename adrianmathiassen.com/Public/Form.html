<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="Form.css">
</head>
<body>
    <header>Login</header>
    <main>
        <form id="Login">
            <!--For name-->
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Write your name here:" required>
            
            <!--For email-->
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Write your email here:" required>
            
            <!--For password-->
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Write password here..." required>

            <fieldset>
                
            </fieldset>
        </form>
    </main>
</body>
</html>
